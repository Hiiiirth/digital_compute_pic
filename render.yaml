services:
  - type: web
    name: digpic-image-processor
    env: python
    buildCommand: pip install -r image_web_system/requirements.txt
    startCommand: gunicorn --chdir image_web_system/backend app:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
    healthCheckPath: /api/health